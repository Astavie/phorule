<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Phorule</title>
  </head>
  <body>
    <main>
        <h1>Phorule</h1>  
    </main>
    <textarea id="math" style="width: 100%; height: 33vh;">
vec(delim: "[", +#text("stop"), angle.l +#text("high") angle.r)
->
vec(delim: "[", alpha#text("back"), angle.l beta#text("high") angle.r)
slash
vec(delim: "[", +#text("syll"), alpha#text("back"), beta#text("round")) C_0 #text("__")

\

mat(delim: #none,
  #text("V "), #text("C "), space, space, space, space, space;
  space, vec(delim: "[", +#text("nasal")), hash, quad -> quad, vec(delim: "[", +#text("nasal")), nothing, space;
  1, 2, 3, space, 1, space, 3;
)
    </textarea>
    <p id="error" style="font-family: monospace; white-space: pre;"></p>
    <div id="result"></div>
  </body>
</html>
